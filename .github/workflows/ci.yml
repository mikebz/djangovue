name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint-python:
    name: Python Linting
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install UV
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.13

    - name: Install Python dependencies
      run: make ci-install-python

    - name: Run Python lint and format checks
      run: make ci-lint-python

  lint-frontend:
    name: Frontend Linting
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install frontend dependencies
      run: make ci-install-frontend

    - name: Build frontend
      run: make ci-frontend-build

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "1"
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install UV
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.13

    - name: Install Python dependencies
      run: make ci-install-python

    - name: Setup Node.js for frontend build
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install frontend dependencies
      run: make ci-install-frontend

    - name: Build frontend for Django integration
      run: make ci-frontend-build

    - name: Run Django checks and tests
      run: make ci-test-python

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint-python, lint-frontend, test-python]
    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "1"
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install UV
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.13

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install all dependencies
      run: |
        make ci-install-python
        make ci-install-frontend

    - name: Build frontend
      run: make ci-frontend-build

    - name: Run integration checks
      run: make ci-test-integration

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install UV
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.13

    - name: Install Python dependencies
      run: uv sync --extra dev

    - name: Run safety check for Python dependencies
      run: |
        uv add --dev safety
        uv run safety check --json || echo "⚠️ Security vulnerabilities found - review required"

    - name: Setup Node.js for security audit
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install frontend dependencies
      run: npm ci

    - name: Run npm security audit
      run: |
        npm audit --audit-level=moderate || echo "⚠️ Frontend security issues found - review required"
