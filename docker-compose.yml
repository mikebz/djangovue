version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.venv
    environment:
      - SECRET_KEY=dev-secret-key-change-me
      - DEBUG=1
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - DJANGO_VITE_DEV_MODE=1
      - DJANGO_VITE_DEV_SERVER_HOST=frontend
      - DJANGO_VITE_DEV_SERVER_PORT=3000
      - DJANGO_SETTINGS_MODULE=djangovue.settings
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run gunicorn djangovue.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
